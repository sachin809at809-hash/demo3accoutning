databases:
  - name: apex-accounting-db
    databaseName: akaunting
    user: akaunting
    plan: free

services:
  # Main Web Service for Laravel
  - type: web
    name: apex-accounting-web
    env: docker
    plan: free
    healthCheckPath: /auth/login
    envVars:
      - key: APP_NAME
        value: "Apex Accounting"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_INSTALLED
        value: "true"
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://apex-accounting-web.onrender.com"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: apex-accounting-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: apex-accounting-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: apex-accounting-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: apex-accounting-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: apex-accounting-db
          property: password
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_MODEL
        value: llama-3.2-11b-vision-preview
